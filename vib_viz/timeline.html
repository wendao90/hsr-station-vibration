<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据文件时间线总览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #140e0a;
    color: #ede0d4;
    padding: 24px;
  }
  h1 { font-size: 20px; margin-bottom: 8px; color: #f0a050; }
  .legend {
    display: flex; gap: 24px; margin-bottom: 12px;
    font-size: 13px; color: #a08a70;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .box { width: 14px; height: 14px; border-radius: 3px; }
  .chart-wrap {
    position: relative;
    background: #1a1410;
    border: 1px solid #2a2118;
    border-radius: 8px;
    overflow: hidden;
    user-select: none;
    cursor: grab;
  }
  .chart-wrap.dragging { cursor: grabbing; }
  canvas { display: block; }
  .tooltip {
    position: fixed;
    background: rgba(30,20,14,0.95);
    border: 1px solid #3a2d1e;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: #ede0d4;
    pointer-events: none;
    display: none;
    z-index: 100;
    white-space: nowrap;
  }
  .hint { font-size: 12px; color: #6b5a45; margin-top: 8px; }
  .loading {
    text-align: center; padding: 40px; color: #a08a70; font-size: 14px;
  }
  .loading .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid #3a2d1e; border-top-color: #f0a050;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h1>数据文件时间线总览</h1>
<div class="legend">
  <span><span class="box" style="background:rgba(240,160,80,0.7)"></span> 音频波形</span>
  <span><span class="box" style="background:rgba(120,200,150,0.7)"></span> 振动加速度</span>
</div>
<div class="chart-wrap" id="chartWrap">
  <div class="loading" id="loadingMsg"><span class="spinner"></span>加载数据中...</div>
  <canvas id="canvas" style="display:none"></canvas>
</div>
<div class="tooltip" id="tooltip"></div>
<div class="hint">滚轮缩放 | 拖拽平移 | 悬停查看详情</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const wrap = document.getElementById('chartWrap');
const loadingMsg = document.getElementById('loadingMsg');

// Layout
const PADDING_LEFT = 100;
const PADDING_RIGHT = 20;
const PADDING_TOP = 10;
const AUDIO_ROW_H = 100;
const VIB_ROW_H = 100;
const GAP = 20;
const AXIS_H = 30;
const TOTAL_HEIGHT = PADDING_TOP + AUDIO_ROW_H + GAP + VIB_ROW_H + AXIS_H;

// View state
const GLOBAL_MIN = 19 * 3600 + 15 * 60;
const GLOBAL_MAX = 22 * 3600 + 40 * 60;
let viewMin = GLOBAL_MIN;
let viewMax = GLOBAL_MAX;

let tlData = null; // loaded data

// Load data
fetch('timeline_data.json').then(r => r.json()).then(data => {
  tlData = data;
  loadingMsg.style.display = 'none';
  canvas.style.display = 'block';
  resize();
  draw();
}).catch(e => {
  loadingMsg.innerHTML = '<span style="color:#e87060">加载失败: ' + e.message + '</span>';
});

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(wrap.offsetWidth || 800, 400);
  canvas.width = w * dpr;
  canvas.height = TOTAL_HEIGHT * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = TOTAL_HEIGHT + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function secToPx(sec) {
  const w = parseInt(canvas.style.width);
  const plotW = w - PADDING_LEFT - PADDING_RIGHT;
  return PADDING_LEFT + (sec - viewMin) / (viewMax - viewMin) * plotW;
}

function pxToSec(px) {
  const w = parseInt(canvas.style.width);
  const plotW = w - PADDING_LEFT - PADDING_RIGHT;
  return viewMin + (px - PADDING_LEFT) / plotW * (viewMax - viewMin);
}

function formatTime(s) {
  const h = Math.floor(s / 3600) % 24;
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function formatDur(s) {
  if (s < 60) return s.toFixed(0) + 's';
  return Math.floor(s/60) + 'm' + Math.round(s%60) + 's';
}

function draw() {
  if (!tlData) return;
  const w = parseInt(canvas.style.width);
  const h = TOTAL_HEIGHT;
  ctx.clearRect(0, 0, w, h);

  const plotL = PADDING_LEFT;
  const plotR = w - PADDING_RIGHT;
  const plotW = plotR - plotL;

  const audioY = PADDING_TOP;
  const vibY = PADDING_TOP + AUDIO_ROW_H + GAP;
  const axisY = vibY + VIB_ROW_H;

  // Row labels
  ctx.font = '12px "Segoe UI", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#f0a050';
  ctx.fillText('音频', plotL - 10, audioY + AUDIO_ROW_H / 2);
  ctx.fillStyle = '#78c896';
  ctx.fillText('振动', plotL - 10, vibY + VIB_ROW_H / 2);

  // Background boxes
  ctx.fillStyle = '#120d08';
  ctx.fillRect(plotL, audioY, plotW, AUDIO_ROW_H);
  ctx.fillRect(plotL, vibY, plotW, VIB_ROW_H);

  // Center lines
  ctx.strokeStyle = '#2a2118';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(plotL, audioY + AUDIO_ROW_H / 2);
  ctx.lineTo(plotR, audioY + AUDIO_ROW_H / 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(plotL, vibY + VIB_ROW_H / 2);
  ctx.lineTo(plotR, vibY + VIB_ROW_H / 2);
  ctx.stroke();

  // Time axis ticks
  const range = viewMax - viewMin;
  let tickStep;
  if (range > 7200) tickStep = 1800;
  else if (range > 3600) tickStep = 600;
  else if (range > 1200) tickStep = 300;
  else if (range > 600) tickStep = 120;
  else if (range > 300) tickStep = 60;
  else if (range > 60) tickStep = 15;
  else tickStep = 5;

  const firstTick = Math.ceil(viewMin / tickStep) * tickStep;
  ctx.font = '10px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let t = firstTick; t <= viewMax; t += tickStep) {
    const x = secToPx(t);
    if (x < plotL || x > plotR) continue;
    ctx.strokeStyle = '#1e1610';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, audioY); ctx.lineTo(x, axisY); ctx.stroke();
    ctx.strokeStyle = '#2a2118';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, axisY); ctx.lineTo(x, axisY + 6); ctx.stroke();
    ctx.fillStyle = '#a08a70';
    const hh = Math.floor(t / 3600) % 24;
    const mm = Math.floor((t % 3600) / 60);
    const ss = Math.floor(t % 60);
    let label = hh + ':' + String(mm).padStart(2,'0');
    if (tickStep < 60) label += ':' + String(ss).padStart(2,'0');
    ctx.fillText(label, x, axisY + 8);
  }

  // Clip to plot area
  ctx.save();
  ctx.beginPath();
  ctx.rect(plotL, 0, plotW, h);
  ctx.clip();

  const pps = tlData.pixelsPerSec; // data resolution

  // === Draw audio waveforms ===
  tlData.audio.forEach(af => {
    const midY = audioY + AUDIO_ROW_H / 2;
    const ampH = AUDIO_ROW_H / 2 * 0.9;
    const binDur = af.duration / af.pos.length; // seconds per bin

    // Only draw bins that are visible
    const visStartBin = Math.max(0, Math.floor((viewMin - af.startSec) / binDur));
    const visEndBin = Math.min(af.pos.length, Math.ceil((viewMax - af.startSec) / binDur));

    if (visEndBin <= 0 || visStartBin >= af.pos.length) return; // fully outside

    // Fill waveform
    ctx.fillStyle = 'rgba(240,160,80,0.5)';
    ctx.beginPath();
    // Top edge (positive peaks)
    for (let i = visStartBin; i < visEndBin; i++) {
      const x = secToPx(af.startSec + i * binDur);
      const y = midY - af.pos[i] * ampH;
      if (i === visStartBin) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    // Bottom edge (negative peaks) reverse
    for (let i = visEndBin - 1; i >= visStartBin; i--) {
      const x = secToPx(af.startSec + i * binDur);
      const y = midY - af.neg[i] * ampH;
      ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();

    // File boundary marker
    const x0 = secToPx(af.startSec);
    const x1 = secToPx(af.startSec + af.duration);
    ctx.strokeStyle = 'rgba(240,160,80,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x0, audioY); ctx.lineTo(x0, audioY + AUDIO_ROW_H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1, audioY); ctx.lineTo(x1, audioY + AUDIO_ROW_H); ctx.stroke();
    ctx.setLineDash([]);

    // File name label at top
    const labelX = Math.max(x0 + 3, plotL + 3);
    if (x1 - x0 > 40) {
      ctx.fillStyle = 'rgba(240,160,80,0.6)';
      ctx.font = '9px "Segoe UI", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(af.name.replace('2026年04月06日 ','').replace('.m4a',''), labelX, audioY + 2);
    }
  });

  // === Draw vibration acceleration ===
  tlData.vib.forEach(vf => {
    const baseY = vibY + VIB_ROW_H; // bottom = 0
    const ampH = VIB_ROW_H * 0.9;
    const binDur = vf.duration / vf.peaks.length;

    // Find max peak for normalization (use global max across all vib for consistency)
    const visStartBin = Math.max(0, Math.floor((viewMin - vf.startSec) / binDur));
    const visEndBin = Math.min(vf.peaks.length, Math.ceil((viewMax - vf.startSec) / binDur));

    if (visEndBin <= 0 || visStartBin >= vf.peaks.length) return;

    // Draw as bars from bottom
    ctx.fillStyle = 'rgba(120,200,150,0.6)';
    for (let i = visStartBin; i < visEndBin; i++) {
      const x = secToPx(vf.startSec + i * binDur);
      const xNext = secToPx(vf.startSec + (i + 1) * binDur);
      const barW = Math.max(xNext - x, 0.5);
      // Normalize: clamp to 1.0 m/s² for display
      const norm = Math.min(vf.peaks[i] / 0.5, 1.0);
      const barH = norm * ampH;
      ctx.fillRect(x, baseY - barH, barW, barH);
    }

    // File boundary
    const x0 = secToPx(vf.startSec);
    const x1 = secToPx(vf.startSec + vf.duration);
    ctx.strokeStyle = 'rgba(120,200,150,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(x0, vibY); ctx.lineTo(x0, vibY + VIB_ROW_H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1, vibY); ctx.lineTo(x1, vibY + VIB_ROW_H); ctx.stroke();
    ctx.setLineDash([]);

    // Label
    const labelX = Math.max(x0 + 3, plotL + 3);
    if (x1 - x0 > 30) {
      ctx.fillStyle = 'rgba(120,200,150,0.6)';
      ctx.font = '9px "Segoe UI", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(vf.name.replace('.xls',''), labelX, vibY + 2);
    }
  });

  ctx.restore(); // un-clip

  // Border around plot areas
  ctx.strokeStyle = '#2a2118';
  ctx.lineWidth = 1;
  ctx.strokeRect(plotL, audioY, plotW, AUDIO_ROW_H);
  ctx.strokeRect(plotL, vibY, plotW, VIB_ROW_H);
}

// === Interaction ===
wrap.addEventListener('wheel', function(e) {
  e.preventDefault();
  const mouseX = e.offsetX;
  const mouseSec = pxToSec(mouseX);
  const range = viewMax - viewMin;
  const factor = e.deltaY > 0 ? 1.2 : 1 / 1.2;
  const newRange = Math.max(20, Math.min(GLOBAL_MAX - GLOBAL_MIN, range * factor));
  const ratio = (mouseSec - viewMin) / range;
  viewMin = mouseSec - ratio * newRange;
  viewMax = mouseSec + (1 - ratio) * newRange;
  if (viewMin < GLOBAL_MIN) { viewMin = GLOBAL_MIN; viewMax = viewMin + newRange; }
  if (viewMax > GLOBAL_MAX) { viewMax = GLOBAL_MAX; viewMin = viewMax - newRange; }
  draw();
}, { passive: false });

let dragging = false, dragStartX = 0, dragStartMin = 0;
wrap.addEventListener('mousedown', function(e) {
  if (e.button === 0) {
    dragging = true;
    dragStartX = e.offsetX;
    dragStartMin = viewMin;
    wrap.classList.add('dragging');
  }
});
window.addEventListener('mousemove', function(e) {
  if (dragging) {
    const rect = wrap.getBoundingClientRect();
    const dx = e.clientX - rect.left - dragStartX;
    const w = parseInt(canvas.style.width);
    const plotW = w - PADDING_LEFT - PADDING_RIGHT;
    const secPerPx = (viewMax - viewMin) / plotW;
    const shift = -dx * secPerPx;
    const range = viewMax - viewMin;
    viewMin = Math.max(GLOBAL_MIN, Math.min(GLOBAL_MAX - range, dragStartMin + shift));
    viewMax = viewMin + range;
    draw();
  }
});
window.addEventListener('mouseup', function() {
  dragging = false;
  wrap.classList.remove('dragging');
});

// Tooltip
wrap.addEventListener('mousemove', function(e) {
  if (dragging || !tlData) { tooltip.style.display = 'none'; return; }
  const mx = e.offsetX, my = e.offsetY;
  const sec = pxToSec(mx);

  const audioTop = PADDING_TOP;
  const vibTop = PADDING_TOP + AUDIO_ROW_H + GAP;
  let hit = null;

  if (my >= audioTop && my < audioTop + AUDIO_ROW_H) {
    for (const af of tlData.audio) {
      if (sec >= af.startSec && sec <= af.startSec + af.duration) {
        hit = { name: af.name, start: af.startSec, end: af.startSec + af.duration, dur: af.duration, type: 'audio' };
        break;
      }
    }
  } else if (my >= vibTop && my < vibTop + VIB_ROW_H) {
    for (const vf of tlData.vib) {
      if (sec >= vf.startSec && sec <= vf.startSec + vf.duration) {
        hit = { name: vf.name, start: vf.startSec, end: vf.startSec + vf.duration, dur: vf.duration, type: 'vib' };
        break;
      }
    }
  }

  if (hit) {
    tooltip.innerHTML = '<b>' + hit.name + '</b><br>' +
      formatTime(hit.start) + ' ~ ' + formatTime(hit.end) + '<br>' +
      '时长: ' + formatDur(hit.dur) + '<br>' +
      '<span style="color:#a08a70">当前: ' + formatTime(sec) + '</span>';
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});
wrap.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });

window.addEventListener('resize', function() { resize(); draw(); });
</script>
</body>
</html>
