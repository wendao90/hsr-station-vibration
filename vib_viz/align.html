<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>振动-音频对齐工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #140e0a;
    color: #ede0d4;
    padding: 14px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  h1 { font-size: 16px; margin-bottom: 8px; color: #f0a050; flex-shrink: 0; }
  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
    font-size: 12px;
    flex-shrink: 0;
  }
  .toolbar select {
    background: #1a1410; color: #ede0d4; border: 1px solid #3a2d1e;
    border-radius: 4px; padding: 4px 8px; font-size: 12px;
  }
  .toolbar button {
    background: #3a2d1e; color: #ede0d4; border: 1px solid #5a4a38;
    border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .toolbar button:hover { background: #5a4a38; }
  .toolbar button.primary { background: #d4873a; border-color: #f0a050; }
  .toolbar button.primary:hover { background: #f0a050; }
  .toolbar .spacer { flex: 1; }
  .status {
    font-size: 11px; color: #a08a70; background: #1a1410;
    padding: 4px 10px; border-radius: 4px; font-variant-numeric: tabular-nums;
    max-width: 460px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .main-layout {
    display: flex;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }
  .main-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  .notes-col {
    width: 340px;
    background: #1a1410;
    border: 1px solid #2a2118;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .notes-col .notes-header {
    padding: 8px 12px;
    border-bottom: 1px solid #2a2118;
    font-size: 12px;
    color: #f0a050;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .notes-col .notes-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.55;
    white-space: pre-wrap;
    color: #c4b59a;
    font-family: 'Consolas', 'Courier New', monospace;
  }
  .notes-col .notes-body .ts-line {
    cursor: pointer;
    padding: 1px 4px;
    margin: 0 -4px;
    border-radius: 3px;
  }
  .notes-col .notes-body .ts-line:hover { background: rgba(240,160,80,0.15); }
  .notes-col .notes-body .ts-line.current { background: rgba(240,160,80,0.25); color: #ffe4b0; }
  .notes-col .notes-body .ts { color: #f0a050; }

  .chart-wrap {
    position: relative;
    background: #1a1410;
    border: 1px solid #2a2118;
    border-radius: 8px;
    overflow: hidden;
    user-select: none;
    cursor: crosshair;
    flex: 1;
    min-height: 0;
  }
  .chart-wrap.panning { cursor: grabbing; }
  canvas { display: block; }
  .tooltip {
    position: fixed;
    background: rgba(30,20,14,0.95);
    border: 1px solid #3a2d1e;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: #ede0d4;
    pointer-events: none;
    display: none;
    z-index: 100;
    white-space: nowrap;
  }
  .hint {
    font-size: 10px; color: #6b5a45; margin-top: 6px;
    display: flex; gap: 12px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .hint b { color: #a08a70; }

  .xls-status-panel {
    margin-top: 8px;
    background: #1a1410;
    border: 1px solid #2a2118;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    max-height: 180px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .xls-status-panel table {
    width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums;
  }
  .xls-status-panel th, .xls-status-panel td {
    padding: 3px 6px; text-align: left; border-bottom: 1px solid #2a2118;
  }
  .xls-status-panel th { color: #a08a70; font-weight: normal; font-size: 10px; }
  .xls-status-panel .good { color: #78c896; }
  .xls-status-panel .warn { color: #f0a050; }
  .xls-status-panel .bad { color: #e87060; }
  .xls-status-panel .dim { color: #6b5a45; }
  .loading { padding: 40px; text-align: center; color: #a08a70; }
  .loading .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid #3a2d1e; border-top-color: #f0a050;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .play-btn {
    background: #5a4a38; color: #ede0d4; border: 1px solid #8a6d48;
    border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer;
  }
  .play-btn.playing { background: #d4873a; border-color: #f0a050; color: #140e0a; }
  input[type="file"] { display: none; }
</style>
</head>
<body>

<h1>🎯 振动-音频对齐工具</h1>

<div class="toolbar">
  <label>音频: <select id="audioSel"></select></label>
  <button class="play-btn" id="playBtn" onclick="togglePlayback()">▶ 播放</button>
  <button id="intervalModeBtn" onclick="toggleIntervalMode()" title="切换到区间标注模式">🚄 标区间</button>
  <select id="eventTypeSel" onchange="currentEventType = this.value" style="display:none">
    <option value="train_pass">🚄 过车</option>
    <option value="knock">🔨 敲击</option>
    <option value="stomp">🦶 跺脚/踩踢</option>
    <option value="announce">📢 广播</option>
    <option value="door">🚪 门开关</option>
    <option value="clean_bgnd">🟰 干净本底</option>
    <option value="other">❓ 其他</option>
  </select>
  <span class="status" id="statusText">准备就绪 (Alt+左键 = 从该处播放)</span>
  <span id="noteRefLabel" style="display:none; font-size:11px; background:rgba(120,200,150,0.15); border:1px solid rgba(120,200,150,0.4); color:#78c896; padding:4px 10px; border-radius:4px; max-width:320px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer" onclick="clearNoteRef()" title="点击取消关联"></span>
  <span class="spacer"></span>
  <button onclick="resetView()">重置视图</button>
  <button onclick="clearAllMarks()">清除标记</button>
  <label class="play-btn" style="cursor:pointer">
    📥 导入 JSON
    <input type="file" id="importFile" accept=".json" onchange="importAlignment(event)">
  </label>
  <button class="primary" onclick="exportAlignment()">📤 导出对齐 JSON</button>
</div>

<div class="main-layout">
  <div class="main-col">
    <div class="chart-wrap" id="chartWrap">
      <div class="loading" id="loadingMsg"><span class="spinner"></span>加载数据中...</div>
      <canvas id="canvas" style="display:none"></canvas>
    </div>
    <div class="hint">
      <span><b>左键单击</b>: 标敲击点</span>
      <span><b>左键拖动空白</b>: 整体平移该行数据</span>
      <span><b>左键拖动标记</b>: 同上</span>
      <span><b>双击标记</b>: 输入精确时间</span>
      <span><b>右键</b>: 删除标记/事件</span>
      <span><b>🚄区间</b>: 拖拽定义事件</span>
      <span><b>Alt+左键</b>: 播放</span>
      <span><b>中键拖</b>: 视图平移</span>
      <span><b>滚轮</b>: 缩放</span>
      <span><b>Shift+拖</b>: 选区放大</span>
    </div>
    <div class="xls-status-panel" id="statusPanel" style="max-height:130px">
      <table id="statusTable">
        <thead><tr><th>xls 文件</th><th>原估计时段</th><th>配对数</th><th>校准后起始</th><th>一致性</th><th>状态</th><th>关联笔记</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="xls-status-panel" id="eventListPanel" style="max-height:130px">
      <div style="color:#6b5a45;font-size:11px;padding:4px">加载中...</div>
    </div>
  </div>

  <div class="notes-col">
    <div class="notes-header">
      <span>📝 记录笔记</span>
      <span style="color:#6b5a45;font-size:10px" id="notesHint">点击时刻行跳转视图</span>
    </div>
    <div class="notes-body" id="notesBody">加载中...</div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ============================================================
// Global State
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const wrap = document.getElementById('chartWrap');
const loadingMsg = document.getElementById('loadingMsg');
const audioSel = document.getElementById('audioSel');
const statusText = document.getElementById('statusText');
const playBtn = document.getElementById('playBtn');
const notesBody = document.getElementById('notesBody');
const noteRefLabel = document.getElementById('noteRefLabel');

let tlData = null;
let datasetsConfig = null;
let currentAudio = null;
let currentVibs = [];
let viewMin = 0, viewMax = 3600;

// Align data (ID-based model)
// Structure: {
//   [audioName]: {
//     audioMarks: [{id, sec, noteRef?: {lineIdx, noteSec, noteText}}, ...],
//     vibMarks: { [xlsName]: [{id, vibRelSec, pairedAudioId: string|null}, ...] }
//   }
// }
let alignData = loadAlignData();
let currentNoteRef = null;  // {lineIdx, noteSec, noteText} - attached to next-created audio mark

// Interval annotation state
let intervalMode = false;  // toggle for creating interval events
let currentEventType = 'train_pass';  // default event type for new intervals
const EVENT_TYPES = {
  train_pass:  { label: '过车', color: 'rgba(96,165,250', icon: '🚄' },
  knock:       { label: '敲击', color: 'rgba(251,191,36', icon: '🔨' },
  stomp:       { label: '跺脚/踩踢', color: 'rgba(167,139,250', icon: '🦶' },
  announce:    { label: '广播', color: 'rgba(120,200,150', icon: '📢' },
  door:        { label: '门开关', color: 'rgba(156,163,175', icon: '🚪' },
  clean_bgnd:  { label: '干净本底', color: 'rgba(107,114,128', icon: '🟰' },
  other:       { label: '其他', color: 'rgba(236,184,130', icon: '❓' },
};

// Audio playback state
let audioCtx = null;
const audioBuffers = {};  // {audioName: AudioBuffer}
let playbackSource = null;
let playbackAudioName = null;
let playbackStartCtxTime = 0;  // audioCtx.currentTime when play started
let playbackStartAudioSec = 0;  // position in audio (relative to audio start) when play started
let playbackAbsStartSec = 0;  // absolute time (since midnight) at playback start
let isPlaying = false;
let playCursorRAF = null;

// ============================================================
// ID generator
// ============================================================
function genId() {
  return 'm' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
}

// ============================================================
// Storage
// ============================================================
function loadAlignData() {
  try {
    const raw = localStorage.getItem('vibAlignDataV2');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {};
}
function saveAlignData() {
  localStorage.setItem('vibAlignDataV2', JSON.stringify(alignData));
}

function ensureAlignEntry() {
  const an = currentAudio.name;
  if (!alignData[an]) alignData[an] = { audioMarks: [], vibMarks: {}, audioShift: 0, xlsShifts: {}, events: [] };
  if (!alignData[an].audioMarks) alignData[an].audioMarks = [];
  if (!alignData[an].vibMarks) alignData[an].vibMarks = {};
  if (typeof alignData[an].audioShift !== 'number') alignData[an].audioShift = 0;
  if (!alignData[an].xlsShifts) alignData[an].xlsShifts = {};
  if (!alignData[an].events) alignData[an].events = [];
  return alignData[an];
}

function getAudioShift() {
  const e = alignData[currentAudio?.name];
  return (e && typeof e.audioShift === 'number') ? e.audioShift : 0;
}

function getXlsExtraShift(xlsName) {
  const e = alignData[currentAudio?.name];
  return (e && e.xlsShifts && typeof e.xlsShifts[xlsName] === 'number') ? e.xlsShifts[xlsName] : 0;
}

// ============================================================
// Offset computation (ID-based)
// ============================================================
function getAudioMarkById(audioName, id) {
  const e = alignData[audioName];
  if (!e || !e.audioMarks) return null;
  return e.audioMarks.find(m => m.id === id) || null;
}

function getVibStartSec(xls) {
  const audioName = currentAudio && currentAudio.name;
  const extraShift = getXlsExtraShift(xls.name);
  if (!audioName) return xls.startSec + extraShift;
  const e = alignData[audioName];
  if (!e || !e.vibMarks || !e.vibMarks[xls.name]) return xls.startSec + extraShift;

  const offsets = [];
  for (const vm of e.vibMarks[xls.name]) {
    if (!vm.pairedAudioId) continue;
    const am = getAudioMarkById(audioName, vm.pairedAudioId);
    if (!am) continue;
    offsets.push(am.sec - vm.vibRelSec);
  }
  if (offsets.length === 0) return xls.startSec + extraShift;
  const derived = offsets.reduce((a,b) => a+b, 0) / offsets.length;
  return derived + extraShift;
}

// ============================================================
// Load data
// ============================================================
async function init() {
  try {
    const [tRes, dRes, notesRes] = await Promise.all([
      fetch('timeline_data.json').then(r => r.json()),
      fetch('datasets.json').then(r => r.json()).catch(() => null),
      fetch('notes.txt').then(r => r.text()).catch(() => '无法加载笔记'),
    ]);
    tlData = tRes;
    datasetsConfig = dRes;

    tlData.audio.forEach((a, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = a.name.replace('2026年04月06日 ', '') +
        '  (' + formatTime(a.startSec) + '~' + formatTime(a.endSec) +
        ', ' + Math.round(a.duration) + 's)';
      audioSel.appendChild(opt);
    });
    const longestIdx = tlData.audio.reduce((best, a, i) =>
      a.duration > tlData.audio[best].duration ? i : best, 0);
    audioSel.value = longestIdx;

    renderNotes(notesRes);

    loadingMsg.style.display = 'none';
    canvas.style.display = 'block';
    audioSel.addEventListener('change', selectAudio);
    selectAudio();
  } catch(e) {
    loadingMsg.innerHTML = '<span style="color:#e87060">加载失败: ' + e.message + '</span>';
  }
}

function selectAudio() {
  stopPlayback();
  const idx = parseInt(audioSel.value);
  currentAudio = tlData.audio[idx];

  currentVibs = tlData.vib.filter(v => {
    const vStart = getVibStartSec(v);
    const vEnd = vStart + v.duration;
    return vEnd >= currentAudio.startSec && vStart <= currentAudio.endSec;
  });

  const pad = Math.max(10, currentAudio.duration * 0.02);
  viewMin = currentAudio.startSec - pad;
  viewMax = currentAudio.endSec + pad;

  resize();
  draw();
  updateStatusPanel();
  renderEventList();
  preloadAudio(currentAudio.name);  // start loading in background
}

// ============================================================
// Audio playback
// ============================================================
async function preloadAudio(audioName) {
  if (audioBuffers[audioName]) return audioBuffers[audioName];
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  try {
    // Use the pre-converted WAV (Chrome's m4a decoder can silently truncate long files)
    const audioObj = tlData.audio.find(a => a.name === audioName);
    const wavName = audioObj && audioObj.wavName ? audioObj.wavName : audioName.replace('.m4a', '.wav');
    statusText.textContent = '加载音频中: ' + wavName + '...';
    const url = 'audio_wav/' + encodeURIComponent(wavName);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const buf = await resp.arrayBuffer();
    const ab = await audioCtx.decodeAudioData(buf);
    audioBuffers[audioName] = ab;
    // Sanity check: compare browser decoded duration vs. stored duration
    const stored = audioObj ? audioObj.duration : null;
    const drift = stored !== null ? Math.abs(ab.duration - stored) : 0;
    const driftNote = drift > 0.5 ? ' ⚠️ 时长偏差 ' + drift.toFixed(2) + 's' : '';
    statusText.textContent = '音频就绪: ' + wavName + ' (' + ab.duration.toFixed(1) + 's)' + driftNote;
    return ab;
  } catch (e) {
    statusText.textContent = '音频加载失败: ' + e.message;
    return null;
  }
}

async function playFromAbsSec(absSec) {
  stopPlayback();
  const ab = await preloadAudio(currentAudio.name);
  if (!ab) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // Audio waveform is displayed at (startSec + audioShift), so convert click position
  // to "time within the audio file" by subtracting both.
  const audioShift = getAudioShift();
  const audioRelSec = Math.max(0, Math.min(ab.duration, absSec - currentAudio.startSec - audioShift));

  playbackSource = audioCtx.createBufferSource();
  playbackSource.buffer = ab;
  playbackSource.connect(audioCtx.destination);
  playbackSource.onended = () => {
    if (playbackSource === null) return;  // already stopped manually
    isPlaying = false;
    playBtn.textContent = '▶ 播放';
    playBtn.classList.remove('playing');
    playbackSource = null;
    if (playCursorRAF) { cancelAnimationFrame(playCursorRAF); playCursorRAF = null; }
    draw();
  };
  playbackSource.start(0, audioRelSec);
  playbackStartCtxTime = audioCtx.currentTime;
  playbackStartAudioSec = audioRelSec;
  playbackAbsStartSec = absSec;
  playbackAudioName = currentAudio.name;
  isPlaying = true;
  playBtn.textContent = '⏸ 暂停';
  playBtn.classList.add('playing');
  animatePlayCursor();
  statusText.textContent = '播放中: @ ' + formatTime(absSec);
}

function stopPlayback() {
  if (playbackSource) {
    try { playbackSource.onended = null; playbackSource.stop(); } catch(e) {}
    playbackSource = null;
  }
  isPlaying = false;
  playBtn.textContent = '▶ 播放';
  playBtn.classList.remove('playing');
  if (playCursorRAF) { cancelAnimationFrame(playCursorRAF); playCursorRAF = null; }
  draw();
}

function animatePlayCursor() {
  if (!isPlaying) return;
  draw();
  playCursorRAF = requestAnimationFrame(animatePlayCursor);
}

function getCurrentPlayAbsSec() {
  if (!isPlaying || !audioCtx) return null;
  const elapsed = audioCtx.currentTime - playbackStartCtxTime;
  return playbackAbsStartSec + elapsed;
}

function togglePlayback() {
  if (isPlaying) {
    stopPlayback();
  } else {
    // Play from middle of view
    playFromAbsSec((viewMin + viewMax) / 2);
  }
}

// ============================================================
// Utilities
// ============================================================
function formatTime(s) {
  const h = Math.floor(s / 3600) % 24;
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function parseTimeHMS(str) {
  // "20:04" or "20:04:30" or "20:04:30.5" -> seconds since midnight
  const m = str.match(/^(\d+):(\d+)(?::(\d+(?:\.\d+)?))?$/);
  if (!m) return null;
  return parseInt(m[1])*3600 + parseInt(m[2])*60 + parseFloat(m[3] || '0');
}

// ============================================================
// Layout
// ============================================================
const PADDING_LEFT = 130;
const PADDING_RIGHT = 20;
const PADDING_TOP = 8;
const AUDIO_H = 90;
const ROW_GAP = 6;
const VIB_ROW_H = 54;
const AXIS_H = 24;

function totalHeight() {
  const nVib = currentVibs.length;
  return PADDING_TOP + AUDIO_H + ROW_GAP + (VIB_ROW_H + ROW_GAP) * nVib + AXIS_H;
}

function audioRowY() { return PADDING_TOP; }
function vibRowY(idx) { return PADDING_TOP + AUDIO_H + ROW_GAP + idx * (VIB_ROW_H + ROW_GAP); }
function axisY() { return PADDING_TOP + AUDIO_H + ROW_GAP + currentVibs.length * (VIB_ROW_H + ROW_GAP); }

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(wrap.offsetWidth || 800, 400);
  const h = totalHeight();
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function secToPx(sec) {
  const w = parseInt(canvas.style.width);
  const plotW = w - PADDING_LEFT - PADDING_RIGHT;
  return PADDING_LEFT + (sec - viewMin) / (viewMax - viewMin) * plotW;
}
function pxToSec(px) {
  const w = parseInt(canvas.style.width);
  const plotW = w - PADDING_LEFT - PADDING_RIGHT;
  return viewMin + (px - PADDING_LEFT) / plotW * (viewMax - viewMin);
}

// ============================================================
// Draw
// ============================================================
function draw() {
  if (!tlData || !currentAudio) return;
  const w = parseInt(canvas.style.width);
  const h = totalHeight();
  ctx.clearRect(0, 0, w, h);

  const plotL = PADDING_LEFT;
  const plotR = w - PADDING_RIGHT;
  const plotW = plotR - plotL;

  // Row labels
  ctx.font = '12px "Segoe UI", "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#f0a050';
  ctx.fillText('🔊 ' + currentAudio.name.replace('2026年04月06日 ', '').replace('.m4a',''),
               plotL - 8, audioRowY() + AUDIO_H / 2);

  currentVibs.forEach((v, i) => {
    ctx.fillStyle = '#78c896';
    ctx.fillText('📊 ' + v.name.replace('.xls',''), plotL - 8, vibRowY(i) + VIB_ROW_H / 2);
  });

  // Backgrounds
  ctx.fillStyle = '#120d08';
  ctx.fillRect(plotL, audioRowY(), plotW, AUDIO_H);
  currentVibs.forEach((v, i) => ctx.fillRect(plotL, vibRowY(i), plotW, VIB_ROW_H));

  drawAxis(plotL, plotR);

  ctx.save();
  ctx.beginPath();
  ctx.rect(plotL, 0, plotW, h);
  ctx.clip();

  drawAudioWaveform(plotL, plotR);
  currentVibs.forEach((v, i) => drawVibRow(v, i, plotL, plotR));

  drawEvents(plotL, plotR);
  drawMarks(plotL, plotR);
  drawPlayCursor(plotL, plotR);

  ctx.restore();

  ctx.strokeStyle = '#2a2118';
  ctx.lineWidth = 1;
  ctx.strokeRect(plotL, audioRowY(), plotW, AUDIO_H);
  currentVibs.forEach((v, i) => ctx.strokeRect(plotL, vibRowY(i), plotW, VIB_ROW_H));
}

function drawAxis(plotL, plotR) {
  const range = viewMax - viewMin;
  let tickStep;
  if (range > 3600) tickStep = 600;
  else if (range > 1200) tickStep = 300;
  else if (range > 600) tickStep = 120;
  else if (range > 300) tickStep = 60;
  else if (range > 60) tickStep = 15;
  else if (range > 20) tickStep = 5;
  else if (range > 5) tickStep = 1;
  else tickStep = 0.5;

  const firstTick = Math.ceil(viewMin / tickStep) * tickStep;
  ctx.font = '10px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const y = axisY();
  for (let t = firstTick; t <= viewMax; t += tickStep) {
    const x = secToPx(t);
    if (x < plotL || x > plotR) continue;
    ctx.strokeStyle = '#1e1610';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, audioRowY()); ctx.lineTo(x, y); ctx.stroke();
    ctx.strokeStyle = '#2a2118';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + 5); ctx.stroke();
    ctx.fillStyle = '#a08a70';
    ctx.fillText(formatTime(t), x, y + 7);
  }
}

function drawAudioWaveform(plotL, plotR) {
  const af = currentAudio;
  const audioShift = getAudioShift();
  const displayStart = af.startSec + audioShift;
  const midY = audioRowY() + AUDIO_H / 2;
  const ampH = AUDIO_H / 2 * 0.92;
  const binDur = af.duration / af.pos.length;
  const visStartBin = Math.max(0, Math.floor((viewMin - displayStart) / binDur));
  const visEndBin = Math.min(af.pos.length, Math.ceil((viewMax - displayStart) / binDur));

  if (visEndBin <= 0 || visStartBin >= af.pos.length) return;

  ctx.strokeStyle = '#2a2118';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(plotL, midY); ctx.lineTo(plotR, midY); ctx.stroke();

  ctx.fillStyle = 'rgba(240,160,80,0.55)';
  ctx.beginPath();
  for (let i = visStartBin; i < visEndBin; i++) {
    const x = secToPx(displayStart + i * binDur);
    const y = midY - af.pos[i] * ampH;
    if (i === visStartBin) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  for (let i = visEndBin - 1; i >= visStartBin; i--) {
    const x = secToPx(displayStart + i * binDur);
    const y = midY - af.neg[i] * ampH;
    ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function drawVibRow(vf, rowIdx, plotL, plotR) {
  const y0 = vibRowY(rowIdx);
  const vStart = getVibStartSec(vf);
  const binDur = vf.duration / vf.peaks.length;

  const xMax = Math.max(1e-3, ...vf.xPos.map(v => Math.abs(v)), ...vf.xNeg.map(v => Math.abs(v)));
  const yMax = Math.max(1e-3, ...vf.yPos.map(v => Math.abs(v)), ...vf.yNeg.map(v => Math.abs(v)));
  const zMax = Math.max(1e-3, ...vf.zPos.map(v => Math.abs(v)), ...vf.zNeg.map(v => Math.abs(v)));

  const x0 = secToPx(vStart);
  const x1 = secToPx(vStart + vf.duration);
  ctx.strokeStyle = 'rgba(120,200,150,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x0, y0 + VIB_ROW_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x1, y0); ctx.lineTo(x1, y0 + VIB_ROW_H); ctx.stroke();
  ctx.setLineDash([]);

  const axisH = (VIB_ROW_H - 4) / 3;
  // Compute pixels per bin at current zoom to decide rendering mode
  const w = parseInt(canvas.style.width);
  const plotW = w - PADDING_LEFT - PADDING_RIGHT;
  const pixPerBin = plotW * binDur / (viewMax - viewMin);

  const drawAxisLine = (posArr, negArr, color, rowOffset, normMax) => {
    const rowMid = y0 + 2 + rowOffset * axisH + axisH / 2;
    const halfH = axisH / 2 * 0.9;
    const zeroColor = color.replace(/[\d.]+\)$/, '0.12)');
    ctx.strokeStyle = zeroColor;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(plotL, rowMid); ctx.lineTo(plotR, rowMid);
    ctx.stroke();

    const visStart = Math.max(0, Math.floor((viewMin - vStart) / binDur));
    const visEnd = Math.min(posArr.length, Math.ceil((viewMax - vStart) / binDur));
    if (visEnd <= visStart) return;

    if (pixPerBin >= 1.5) {
      // Line-chart mode: connect signed peaks (value with larger |abs|) for readable waveform
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.2;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let i = visStart; i < visEnd; i++) {
        const x = secToPx(vStart + i * binDur);
        const p = posArr[i], n = negArr[i];
        const v = Math.abs(p) >= Math.abs(n) ? p : n;
        const y = rowMid - v / normMax * halfH;
        if (i === visStart) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    } else {
      // Envelope mode (zoomed out): fill area between pos and neg
      const fillColor = color.replace(/[\d.]+\)$/, '0.4)');
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      for (let i = visStart; i < visEnd; i++) {
        const x = secToPx(vStart + i * binDur);
        const y = rowMid - posArr[i] / normMax * halfH;
        if (i === visStart) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      for (let i = visEnd - 1; i >= visStart; i--) {
        const x = secToPx(vStart + i * binDur);
        const y = rowMid - negArr[i] / normMax * halfH;
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      // Thin outline
      ctx.strokeStyle = color;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let i = visStart; i < visEnd; i++) {
        const x = secToPx(vStart + i * binDur);
        const yP = rowMid - posArr[i] / normMax * halfH;
        if (i === visStart) ctx.moveTo(x, yP);
        else ctx.lineTo(x, yP);
      }
      ctx.stroke();
      ctx.beginPath();
      for (let i = visStart; i < visEnd; i++) {
        const x = secToPx(vStart + i * binDur);
        const yN = rowMid - negArr[i] / normMax * halfH;
        if (i === visStart) ctx.moveTo(x, yN);
        else ctx.lineTo(x, yN);
      }
      ctx.stroke();
    }
  };
  drawAxisLine(vf.xPos, vf.xNeg, 'rgba(248,113,113,0.85)', 0, xMax);
  drawAxisLine(vf.yPos, vf.yNeg, 'rgba(120,200,150,0.85)', 1, yMax);
  drawAxisLine(vf.zPos, vf.zNeg, 'rgba(96,165,250,0.9)', 2, zMax);

  // Axis labels
  ctx.font = '8px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ['X','Y','Z'].forEach((lbl, i) => {
    const colors = ['rgba(248,113,113,0.6)','rgba(120,200,150,0.6)','rgba(96,165,250,0.6)'];
    ctx.fillStyle = colors[i];
    ctx.fillText(lbl, Math.min(x1 + 3, plotR - 10), y0 + 2 + i * axisH + axisH * 0.5);
  });

  if (x1 - x0 > 40) {
    ctx.fillStyle = 'rgba(120,200,150,0.55)';
    ctx.font = '9px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const labelX = Math.max(x0 + 3, plotL + 3);
    ctx.fillText(vf.name.replace('.xls',''), labelX, y0 + 2);
  }
}

function drawMarks(plotL, plotR) {
  const audioName = currentAudio.name;
  const a = alignData[audioName];
  if (!a) return;

  if (a.audioMarks) {
    a.audioMarks.forEach(m => {
      const x = secToPx(m.sec);
      if (x < plotL - 10 || x > plotR + 10) return;
      drawAudioMark(x, audioRowY(), AUDIO_H, !!m.noteRef);
    });
  }

  if (a.vibMarks) {
    currentVibs.forEach((v, rowIdx) => {
      const arr = a.vibMarks[v.name];
      if (!arr) return;
      const vStart = getVibStartSec(v);
      arr.forEach(pair => {
        const absSec = vStart + pair.vibRelSec;
        const x = secToPx(absSec);
        if (x < plotL - 10 || x > plotR + 10) return;
        // Check if the paired audio mark has a noteRef
        const pairedAudio = pair.pairedAudioId ? getAudioMarkById(currentAudio.name, pair.pairedAudioId) : null;
        const hasNote = pairedAudio && pairedAudio.noteRef;
        drawVibMark(x, vibRowY(rowIdx), VIB_ROW_H, !!pair.pairedAudioId, hasNote);
      });
    });
  }
}

function drawAudioMark(x, yTop, height, hasNote) {
  ctx.strokeStyle = 'rgba(239,68,68,0.9)';
  ctx.fillStyle = 'rgba(239,68,68,0.9)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, yTop); ctx.lineTo(x, yTop + height);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 5, yTop); ctx.lineTo(x + 5, yTop); ctx.lineTo(x, yTop + 8);
  ctx.closePath(); ctx.fill();
  // Note-linked indicator: small pin
  if (hasNote) {
    ctx.fillStyle = 'rgba(120,200,150,1)';
    ctx.strokeStyle = 'rgba(20,14,10,0.9)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, yTop + 2, 2.5, 0, 2 * Math.PI);
    ctx.fill();
    ctx.stroke();
  }
}

function drawVibMark(x, yTop, height, paired, hasNote) {
  const color = paired ? 'rgba(52,211,153,0.95)' : 'rgba(52,211,153,0.55)';
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, yTop); ctx.lineTo(x, yTop + height);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 5, yTop + height); ctx.lineTo(x + 5, yTop + height); ctx.lineTo(x, yTop + height - 8);
  ctx.closePath(); ctx.fill();
  if (hasNote) {
    ctx.fillStyle = 'rgba(255,220,100,1)';
    ctx.strokeStyle = 'rgba(20,14,10,0.9)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, yTop + height - 2, 2.5, 0, 2 * Math.PI);
    ctx.fill();
    ctx.stroke();
  }
}

function drawPlayCursor(plotL, plotR) {
  const cur = getCurrentPlayAbsSec();
  if (cur === null) return;
  const x = secToPx(cur);
  if (x < plotL || x > plotR) return;
  ctx.strokeStyle = 'rgba(255,220,100,0.9)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, 0); ctx.lineTo(x, totalHeight() - AXIS_H);
  ctx.stroke();
  // Head dot
  ctx.fillStyle = 'rgba(255,220,100,0.9)';
  ctx.beginPath();
  ctx.arc(x, 6, 4, 0, 2 * Math.PI);
  ctx.fill();
}

// ============================================================
// Hit detection
// ============================================================
function locateClickRow(x, y) {
  const plotL = PADDING_LEFT;
  const w = parseInt(canvas.style.width);
  const plotR = w - PADDING_RIGHT;
  if (x < plotL || x > plotR) return null;
  if (y >= audioRowY() && y < audioRowY() + AUDIO_H) return { type: 'audio' };
  for (let i = 0; i < currentVibs.length; i++) {
    if (y >= vibRowY(i) && y < vibRowY(i) + VIB_ROW_H) {
      return { type: 'vib', xls: currentVibs[i], rowIdx: i };
    }
  }
  return null;
}

function findNearbyMark(type, absSec, xlsName) {
  const tol = (viewMax - viewMin) * 0.003;
  const a = alignData[currentAudio.name];
  if (!a) return null;
  if (type === 'audio' && a.audioMarks) {
    for (const m of a.audioMarks) {
      if (Math.abs(m.sec - absSec) < tol) return { type: 'audio', mark: m };
    }
  }
  if (type === 'vib' && a.vibMarks && a.vibMarks[xlsName]) {
    const arr = a.vibMarks[xlsName];
    const xls = currentVibs.find(v => v.name === xlsName);
    const vStart = getVibStartSec(xls);
    for (const vm of arr) {
      if (Math.abs(vStart + vm.vibRelSec - absSec) < tol) {
        return { type: 'vib', xlsName, mark: vm };
      }
    }
  }
  return null;
}

// ============================================================
// Mark operations (ID-based)
// ============================================================
function addAudioMark(absSec) {
  const a = ensureAlignEntry();
  const mark = { id: genId(), sec: absSec };
  if (currentNoteRef) {
    mark.noteRef = {
      lineIdx: currentNoteRef.lineIdx,
      noteSec: currentNoteRef.noteSec,
      noteText: currentNoteRef.noteText,
    };
  }
  a.audioMarks.push(mark);
  a.audioMarks.sort((x, y) => x.sec - y.sec);

  // Auto-pair: find unpaired vib marks near this audio time, pair them
  const tolerance = 300; // 5 min - same generous tolerance as addVibMark
  let pairedCount = 0;
  Object.keys(a.vibMarks).forEach(xlsName => {
    const xls = currentVibs.find(v => v.name === xlsName);
    if (!xls) return;
    const curStart = getVibStartSec(xls);
    let xlsPaired = false;
    a.vibMarks[xlsName].forEach(vm => {
      if (vm.pairedAudioId) return;
      const vAbs = curStart + vm.vibRelSec;
      if (Math.abs(vAbs - absSec) < tolerance) {
        vm.pairedAudioId = mark.id;
        pairedCount++;
        xlsPaired = true;
      }
    });
    // When a pair is formed, pair-based derivation fully determines alignment.
    // Zero xlsShifts so it doesn't get double-applied.
    if (xlsPaired && a.xlsShifts && a.xlsShifts[xlsName]) {
      a.xlsShifts[xlsName] = 0;
    }
  });

  saveAlignData();
  draw();
  updateStatusPanel();
  statusText.textContent = '标记音频敲击 @ ' + formatTime(absSec) +
    (pairedCount ? ' (自动配对 ' + pairedCount + ' 个振动标记)' : '');
}

function addVibMark(xls, absSec) {
  const a = ensureAlignEntry();
  const curStart = getVibStartSec(xls);
  const relSec = absSec - curStart;

  // Find nearest audio mark within a generous 5-minute tolerance.
  // (Initial estimate error from filename rounding can be up to 60s;
  //  file save delay can be up to a few minutes. 300s covers both comfortably.)
  let nearest = null;
  const TOLERANCE_SEC = 300;
  let nearestDist = Infinity;
  for (const am of a.audioMarks) {
    const d = Math.abs(am.sec - absSec);
    if (d < nearestDist && d < TOLERANCE_SEC) {
      nearest = am;
      nearestDist = d;
    }
  }

  if (!a.vibMarks[xls.name]) a.vibMarks[xls.name] = [];
  const vm = {
    id: genId(),
    vibRelSec: relSec,
    pairedAudioId: nearest ? nearest.id : null,
  };
  a.vibMarks[xls.name].push(vm);

  // When a pair is formed, the pair-based derivation fully determines alignment.
  // Zero xlsShifts so it doesn't get double-applied on top of the derivation.
  // (vibRelSec was computed from curStart which already included xlsShifts,
  //  so the derivation = audioMark.sec - vibRelSec already produces the correct display_start.)
  if (nearest && a.xlsShifts && a.xlsShifts[xls.name]) {
    a.xlsShifts[xls.name] = 0;
  }

  saveAlignData();
  draw();
  updateStatusPanel();

  if (nearest) {
    statusText.textContent = '配对: ' + xls.name + ' ↔ 音频 ' + formatTime(nearest.sec);
  } else {
    statusText.textContent = '振动标记 (未配对) ' + xls.name + ' t=' + relSec.toFixed(2) + 's';
  }
}

function deleteMark(hit) {
  const a = alignData[currentAudio.name];
  if (!a) return;
  if (hit.type === 'audio') {
    const delId = hit.mark.id;
    a.audioMarks = a.audioMarks.filter(m => m.id !== delId);
    // Un-pair any vib marks referencing this id
    Object.keys(a.vibMarks).forEach(xlsName => {
      a.vibMarks[xlsName].forEach(vm => {
        if (vm.pairedAudioId === delId) vm.pairedAudioId = null;
      });
    });
  } else if (hit.type === 'vib') {
    const delId = hit.mark.id;
    a.vibMarks[hit.xlsName] = a.vibMarks[hit.xlsName].filter(vm => vm.id !== delId);
    if (a.vibMarks[hit.xlsName].length === 0) delete a.vibMarks[hit.xlsName];
  }
  saveAlignData();
  draw();
  updateStatusPanel();
  statusText.textContent = '已删除标记';
}

// ============================================================
// Mouse events
// ============================================================
let mouseDown = null;

wrap.addEventListener('mousedown', function(e) {
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (e.button === 1) {
    e.preventDefault();
    mouseDown = { type: 'pan', startX: x, startViewMin: viewMin, startViewMax: viewMax };
    wrap.classList.add('panning');
  } else if (e.button === 0 && e.altKey) {
    // Alt+left → play from here
    const absSec = pxToSec(x);
    playFromAbsSec(absSec);
  } else if (e.button === 0 && e.shiftKey) {
    mouseDown = { type: 'zoomBox', startX: x, startY: y, curX: x, curY: y };
  } else if (e.button === 0) {
    // In interval mode, check for edge-drag first, then start new interval on empty area
    if (intervalMode) {
      const edgeHit = findEventEdgeAtPx(x, y);
      if (edgeHit) {
        mouseDown = { type: 'resizeEvent', event: edgeHit.event, edge: edgeHit.edge, startX: x };
        wrap.style.cursor = 'ew-resize';
        return;
      }
      // Start drawing new interval
      mouseDown = { type: 'createInterval', startX: x, curX: x, startSec: pxToSec(x) };
      return;
    }
    const loc = locateClickRow(x, y);
    if (!loc) return;
    const absSec = pxToSec(x);
    // Check if clicking near an existing mark: if so, enter drag mode
    const xlsName = loc.type === 'vib' ? loc.xls.name : null;
    const hit = findNearbyMark(loc.type, absSec, xlsName);
    if (hit) {
      mouseDown = {
        type: 'dragMark',
        hit: hit,
        loc: loc,
        startX: x,
        dragged: false,
      };
      wrap.style.cursor = 'ew-resize';
    } else {
      // Pending click-or-drag:
      //   - short click (no move) → create mark at click position
      //   - drag → translate the whole row (audio or that xls)
      mouseDown = {
        type: 'pendingRowAction',
        loc: loc,
        startX: x,
        startSec: absSec,
        lastX: x,
        dragged: false,
      };
    }
  }
});

wrap.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const loc = locateClickRow(x, y);
  if (!loc) return;
  const absSec = pxToSec(x);
  // In interval mode, right-click deletes an event; else delete mark
  if (intervalMode) {
    const ev = findEventAtPx(x, y);
    if (ev) {
      if (confirm('删除事件: ' + ev.label + ' (' + formatTime(ev.startSec) + '~' + formatTime(ev.endSec) + ')?')) {
        deleteEvent(ev.id);
      }
    }
    return;
  }
  const xlsName = loc.type === 'vib' ? loc.xls.name : null;
  const hit = findNearbyMark(loc.type, absSec, xlsName);
  if (hit) deleteMark(hit);
});

// Double-click a mark to edit its time via prompt (translates entire data to that time)
wrap.addEventListener('dblclick', function(e) {
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const loc = locateClickRow(x, y);
  if (!loc) return;
  const absSec = pxToSec(x);
  const xlsName = loc.type === 'vib' ? loc.xls.name : null;
  const hit = findNearbyMark(loc.type, absSec, xlsName);
  if (!hit) return;

  let currentMarkSec;
  if (hit.type === 'audio') {
    currentMarkSec = hit.mark.sec;
  } else {
    const xls = currentVibs.find(v => v.name === hit.xlsName);
    currentMarkSec = getVibStartSec(xls) + hit.mark.vibRelSec;
  }
  const input = prompt('输入对齐线的目标时间 (HH:MM:SS 或 HH:MM:SS.m):\n当前位置: ' + formatTime(currentMarkSec),
    formatTime(currentMarkSec));
  if (!input) return;
  const newSec = parseTimeHMS(input.trim());
  if (newSec === null || isNaN(newSec)) { alert('格式不识别'); return; }
  const delta = newSec - currentMarkSec;
  if (Math.abs(delta) < 0.001) return;

  const a = ensureAlignEntry();
  if (hit.type === 'audio') {
    a.audioShift = (a.audioShift || 0) + delta;
    a.audioMarks.forEach(m => m.sec += delta);
  } else {
    if (!a.xlsShifts) a.xlsShifts = {};
    a.xlsShifts[hit.xlsName] = (a.xlsShifts[hit.xlsName] || 0) + delta;
  }
  saveAlignData();
  draw();
  updateStatusPanel();
  statusText.textContent = '已平移 ' + (delta > 0 ? '+' : '') + delta.toFixed(2) + 's → ' + formatTime(newSec);
});

window.addEventListener('mousemove', function(e) {
  if (!mouseDown) return;
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (mouseDown.type === 'pan') {
    const w = parseInt(canvas.style.width);
    const plotW = w - PADDING_LEFT - PADDING_RIGHT;
    const secPerPx = (mouseDown.startViewMax - mouseDown.startViewMin) / plotW;
    const shift = -(x - mouseDown.startX) * secPerPx;
    const range = mouseDown.startViewMax - mouseDown.startViewMin;
    viewMin = mouseDown.startViewMin + shift;
    viewMax = viewMin + range;
    draw();
  } else if (mouseDown.type === 'zoomBox') {
    mouseDown.curX = x; mouseDown.curY = y;
    draw();
    ctx.fillStyle = 'rgba(240,160,80,0.15)';
    ctx.strokeStyle = 'rgba(240,160,80,0.8)';
    ctx.lineWidth = 1;
    const bx = Math.min(mouseDown.startX, x);
    const bw = Math.abs(x - mouseDown.startX);
    ctx.fillRect(bx, 0, bw, totalHeight());
    ctx.strokeRect(bx, 0, bw, totalHeight());
  } else if (mouseDown.type === 'pendingRowAction') {
    if (Math.abs(x - mouseDown.startX) > 3) mouseDown.dragged = true;
    if (mouseDown.dragged) {
      const curSec = pxToSec(x);
      const lastSec = pxToSec(mouseDown.lastX);
      const delta = curSec - lastSec;
      mouseDown.lastX = x;
      const a = ensureAlignEntry();
      if (mouseDown.loc.type === 'audio') {
        a.audioShift = (a.audioShift || 0) + delta;
        a.audioMarks.forEach(m => m.sec += delta);
      } else {
        if (!a.xlsShifts) a.xlsShifts = {};
        a.xlsShifts[mouseDown.loc.xls.name] = (a.xlsShifts[mouseDown.loc.xls.name] || 0) + delta;
      }
      draw();
      updateStatusPanel();
      const label = mouseDown.loc.type === 'audio' ? '音频' : mouseDown.loc.xls.name;
      statusText.textContent = '拖动平移: ' + label;
      wrap.style.cursor = 'grabbing';
    }
  } else if (mouseDown.type === 'createInterval') {
    mouseDown.curX = x;
    draw();
    // Draw preview rect
    const tc = EVENT_TYPES[currentEventType] || EVENT_TYPES.other;
    const bx0 = Math.min(mouseDown.startX, x);
    const bx1 = Math.max(mouseDown.startX, x);
    const topY = audioRowY();
    const botY = axisY();
    ctx.fillStyle = tc.color + ',0.18)';
    ctx.strokeStyle = tc.color + ',0.8)';
    ctx.lineWidth = 1.5;
    ctx.fillRect(bx0, topY, bx1 - bx0, botY - topY);
    ctx.strokeRect(bx0, topY, bx1 - bx0, botY - topY);
    ctx.fillStyle = tc.color + ',1)';
    ctx.font = 'bold 11px "Segoe UI", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(tc.icon + ' ' + tc.label + ' ' + (pxToSec(bx1) - pxToSec(bx0)).toFixed(1) + 's',
                 bx0 + 4, topY + 2);
  } else if (mouseDown.type === 'resizeEvent') {
    const newSec = pxToSec(x);
    if (mouseDown.edge === 'start') mouseDown.event.startSec = newSec;
    else mouseDown.event.endSec = newSec;
    draw();
  } else if (mouseDown.type === 'dragMark') {
    if (Math.abs(x - mouseDown.startX) > 2) mouseDown.dragged = true;
    // Compute delta from last move (incremental)
    const curSec = pxToSec(x);
    const lastSec = pxToSec(mouseDown.lastX || mouseDown.startX);
    const delta = curSec - lastSec;
    mouseDown.lastX = x;

    const a = ensureAlignEntry();
    const hit = mouseDown.hit;
    if (hit.type === 'audio') {
      // Shift the entire audio: audioShift, all audio marks move together.
      // Vib rows follow automatically (via pair-derived vibStart using mark.sec).
      a.audioShift = (a.audioShift || 0) + delta;
      a.audioMarks.forEach(m => m.sec += delta);
    } else if (hit.type === 'vib') {
      // Shift only this xls: xlsShifts[xlsName] += delta.
      // Vib marks' vibRelSec stay; display shifts because getVibStartSec adds xlsShifts.
      if (!a.xlsShifts) a.xlsShifts = {};
      a.xlsShifts[hit.xlsName] = (a.xlsShifts[hit.xlsName] || 0) + delta;
    }
    draw();
    updateStatusPanel();
    statusText.textContent = '拖动整体平移: ' + (delta > 0 ? '+' : '') + curSec.toFixed(2) + 's  (Δ ' + (hit.type==='audio'?'音频全局':hit.xlsName) + ')';
  }
});

window.addEventListener('mouseup', function(e) {
  if (!mouseDown) return;
  if (mouseDown.type === 'zoomBox') {
    const rect = wrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const x0 = Math.min(mouseDown.startX, x);
    const x1 = Math.max(mouseDown.startX, x);
    if (x1 - x0 > 10) {
      viewMin = pxToSec(x0);
      viewMax = pxToSec(x1);
      draw();
    }
  } else if (mouseDown.type === 'dragMark') {
    if (mouseDown.dragged) {
      // Re-sort audio marks if an audio mark was moved
      if (mouseDown.hit.type === 'audio') {
        const a = alignData[currentAudio.name];
        if (a && a.audioMarks) a.audioMarks.sort((x, y) => x.sec - y.sec);
      }
      saveAlignData();
      statusText.textContent = '标记位置已更新';
    }
    wrap.style.cursor = '';
  } else if (mouseDown.type === 'pendingRowAction') {
    if (mouseDown.dragged) {
      saveAlignData();
      const label = mouseDown.loc.type === 'audio' ? '音频' : mouseDown.loc.xls.name;
      statusText.textContent = '✓ ' + label + ' 平移已保存';
    } else {
      // Treat as plain click - create mark at the initial click position
      if (mouseDown.loc.type === 'audio') {
        addAudioMark(mouseDown.startSec);
      } else {
        addVibMark(mouseDown.loc.xls, mouseDown.startSec);
      }
    }
    wrap.style.cursor = '';
  } else if (mouseDown.type === 'createInterval') {
    const rect = wrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const endSec = pxToSec(x);
    if (Math.abs(x - mouseDown.startX) > 5) {
      addEvent(mouseDown.startSec, endSec, currentEventType);
    }
  } else if (mouseDown.type === 'resizeEvent') {
    // Normalize order if flipped
    if (mouseDown.event.startSec > mouseDown.event.endSec) {
      const t = mouseDown.event.startSec;
      mouseDown.event.startSec = mouseDown.event.endSec;
      mouseDown.event.endSec = t;
    }
    saveAlignData();
    renderEventList();
    wrap.style.cursor = '';
  }
  mouseDown = null;
  wrap.classList.remove('panning');
});

wrap.addEventListener('wheel', function(e) {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseSec = pxToSec(mouseX);
  const range = viewMax - viewMin;
  const factor = e.deltaY > 0 ? 1.3 : 1 / 1.3;
  const newRange = Math.max(0.5, Math.min(7200, range * factor));
  const ratio = (mouseSec - viewMin) / range;
  viewMin = mouseSec - ratio * newRange;
  viewMax = mouseSec + (1 - ratio) * newRange;
  draw();
}, { passive: false });

wrap.addEventListener('mousemove', function(e) {
  if (mouseDown) { tooltip.style.display = 'none'; return; }
  const rect = wrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const loc = locateClickRow(x, y);
  if (!loc) { tooltip.style.display = 'none'; wrap.style.cursor = ''; return; }
  const absSec = pxToSec(x);
  const xlsName = loc.type === 'vib' ? loc.xls.name : null;
  const hit = findNearbyMark(loc.type, absSec, xlsName);
  // Hover cursor: indicate draggable on existing marks, or resize on event edge
  if (intervalMode) {
    const edgeHit = findEventEdgeAtPx(x, y);
    wrap.style.cursor = edgeHit ? 'ew-resize' : 'text';
  } else {
    wrap.style.cursor = hit ? 'ew-resize' : 'crosshair';
  }

  let html = '<b>' + formatTime(absSec) + '</b>';
  if (loc.type === 'vib') {
    const vStart = getVibStartSec(loc.xls);
    html += '<br>' + loc.xls.name + '<br>t = ' + (absSec - vStart).toFixed(2) + 's';
  } else {
    html += '<br>' + currentAudio.name;
    html += '<br>音频内 t = ' + (absSec - currentAudio.startSec).toFixed(2) + 's';
  }

  // If hovering near a mark, show its associated note + drag hint
  if (hit) {
    let noteRef = null;
    let markSec = null;
    if (hit.type === 'audio') {
      noteRef = hit.mark.noteRef;
      markSec = hit.mark.sec;
    } else {
      const pairedId = hit.mark.pairedAudioId;
      if (pairedId) {
        const am = getAudioMarkById(currentAudio.name, pairedId);
        if (am) { noteRef = am.noteRef; markSec = am.sec; }
      }
    }
    if (noteRef) {
      html += '<br><span style="color:#78c896;font-size:10px">📝 ' +
              noteRef.noteText.slice(0, 60) +
              (noteRef.noteText.length > 60 ? '…' : '') + '</span>';
      // Show offset between audio mark sec and note sec
      if (markSec !== null) {
        const dev = markSec - noteRef.noteSec;
        const devColor = Math.abs(dev) < 5 ? '#78c896' : (Math.abs(dev) < 30 ? '#f0a050' : '#e87060');
        html += '<br><span style="color:' + devColor + ';font-size:10px">⚠ 与笔记偏差: ' +
                (dev >= 0 ? '+' : '') + dev.toFixed(1) + 's</span>';
      }
    }
    html += '<br><span style="color:#a08a70;font-size:10px">拖动调整 • 右键删除</span>';
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
});
wrap.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });

// Keyboard shortcuts
window.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'Escape') { stopPlayback(); }
  else if (e.key === ' ') { e.preventDefault(); togglePlayback(); }
});

// ============================================================
// Status panel
// ============================================================
function updateStatusPanel() {
  const tbody = document.querySelector('#statusTable tbody');
  tbody.innerHTML = '';
  currentVibs.forEach(v => {
    const origStart = v.startSec;
    const origRange = formatTime(origStart) + '~' + formatTime(origStart + v.duration);
    const a = alignData[currentAudio.name];
    const marks = (a && a.vibMarks && a.vibMarks[v.name]) ? a.vibMarks[v.name] : [];
    const paired = marks.filter(m => m.pairedAudioId);
    const nPairs = paired.length;

    let offsetStr = '—';
    let consistStr = '—';
    let statusStr = '<span class="dim">未校准</span>';
    if (nPairs > 0) {
      const offsets = paired.map(p => {
        const am = getAudioMarkById(currentAudio.name, p.pairedAudioId);
        return am ? am.sec - p.vibRelSec : null;
      }).filter(x => x !== null);
      if (offsets.length > 0) {
        const meanOff = offsets.reduce((a,b) => a+b, 0) / offsets.length;
        offsetStr = formatTime(meanOff);
        if (offsets.length === 1) {
          consistStr = '<span class="warn">单点</span>';
          statusStr = '<span class="warn">1 点对齐</span>';
        } else {
          const maxDev = Math.max(...offsets.map(o => Math.abs(o - meanOff)));
          if (maxDev < 0.05) {
            consistStr = '<span class="good">±' + (maxDev*1000).toFixed(0) + 'ms</span>';
            statusStr = '<span class="good">✓ 已校准</span>';
          } else if (maxDev < 0.5) {
            consistStr = '<span class="warn">±' + (maxDev*1000).toFixed(0) + 'ms</span>';
            statusStr = '<span class="warn">误差可接受</span>';
          } else {
            consistStr = '<span class="bad">±' + maxDev.toFixed(2) + 's</span>';
            statusStr = '<span class="bad">⚠ 不一致</span>';
          }
        }
      }
    }
    // Collect associated notes from paired audio marks
    const notes = new Set();
    paired.forEach(p => {
      const am = getAudioMarkById(currentAudio.name, p.pairedAudioId);
      if (am && am.noteRef) {
        notes.add(am.noteRef.noteText.slice(0, 30) + (am.noteRef.noteText.length > 30 ? '…' : ''));
      }
    });
    const notesStr = notes.size ? '<span style="color:#78c896">📝 ' + Array.from(notes).join('; ') + '</span>' : '<span class="dim">—</span>';

    const row = tbody.insertRow();
    row.innerHTML = '<td>' + v.name + '</td>' +
                    '<td class="dim">' + origRange + '</td>' +
                    '<td>' + nPairs + '/' + marks.length + '</td>' +
                    '<td>' + offsetStr + '</td>' +
                    '<td>' + consistStr + '</td>' +
                    '<td>' + statusStr + '</td>' +
                    '<td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' +
                    Array.from(notes).join(' | ').replace(/"/g,'&quot;') + '">' + notesStr + '</td>';
  });
}

// ============================================================
// Notes sidebar
// ============================================================
function renderNotes(text) {
  const lines = text.split('\n');
  let html = '';
  const tsRegex = /(\d{1,2}):(\d{2})(?::(\d{2}))?/;
  lines.forEach((line, idx) => {
    const m = line.match(tsRegex);
    if (m && line.trim()) {
      const h = parseInt(m[1]);
      const mm = parseInt(m[2]);
      const ss = m[3] ? parseInt(m[3]) : 0;
      if (h >= 0 && h <= 23) {
        const sec = h*3600 + mm*60 + ss;
        // Store the full line text as data-note so it can be associated with marks
        const safeNote = line.replace(/"/g, '&quot;');
        html += '<div class="ts-line" data-sec="' + sec + '" data-line-idx="' + idx + '" data-note="' + safeNote + '">' +
                line.replace(tsRegex, '<span class="ts">$&</span>') +
                '</div>';
        return;
      }
    }
    html += '<div>' + (line || '&nbsp;') + '</div>';
  });
  notesBody.innerHTML = html;
  notesBody.querySelectorAll('.ts-line').forEach(el => {
    el.addEventListener('click', () => {
      const sec = parseInt(el.dataset.sec);
      // Center view on this timestamp (±30s)
      viewMin = sec - 30;
      viewMax = sec + 30;
      draw();
      // Set as active reference note + highlight
      notesBody.querySelectorAll('.ts-line.current').forEach(e => e.classList.remove('current'));
      el.classList.add('current');
      currentNoteRef = {
        lineIdx: parseInt(el.dataset.lineIdx),
        noteSec: sec,
        noteText: el.dataset.note,
      };
      updateNoteRefDisplay();
    });
  });
}

function updateNoteRefDisplay() {
  if (currentNoteRef) {
    noteRefLabel.textContent = '当前关联: ' + currentNoteRef.noteText.slice(0, 40) +
      (currentNoteRef.noteText.length > 40 ? '…' : '');
    noteRefLabel.style.display = '';
  } else {
    noteRefLabel.style.display = 'none';
  }
}

function clearNoteRef() {
  currentNoteRef = null;
  notesBody.querySelectorAll('.ts-line.current').forEach(e => e.classList.remove('current'));
  updateNoteRefDisplay();
}

function highlightNoteLineBySec(sec) {
  notesBody.querySelectorAll('.ts-line.current').forEach(e => e.classList.remove('current'));
  const match = notesBody.querySelector('.ts-line[data-sec="' + sec + '"]');
  if (match) {
    match.classList.add('current');
    match.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// ============================================================
// Actions
// ============================================================
function resetView() {
  if (!currentAudio) return;
  const pad = Math.max(10, currentAudio.duration * 0.02);
  viewMin = currentAudio.startSec - pad;
  viewMax = currentAudio.endSec + pad;
  draw();
}

function clearAllMarks() {
  if (!currentAudio) return;
  if (!confirm('清除当前音频所有标记？')) return;
  delete alignData[currentAudio.name];
  saveAlignData();
  draw();
  updateStatusPanel();
}

function exportAlignment() {
  const out = {
    generated: new Date().toISOString(),
    version: 2,
    alignData: alignData,  // full state, re-importable
    summary: {}
  };
  // Human-readable summary
  Object.keys(alignData).forEach(audioName => {
    const e = alignData[audioName];
    const sum = { audioMarkCount: (e.audioMarks || []).length, vibFiles: {} };
    Object.keys(e.vibMarks || {}).forEach(xlsName => {
      const marks = e.vibMarks[xlsName];
      const paired = marks.filter(m => m.pairedAudioId);
      const entry = { totalMarks: marks.length, pairedMarks: paired.length, pairs: [] };
      const offsets = [];
      paired.forEach(vm => {
        const am = (e.audioMarks || []).find(m => m.id === vm.pairedAudioId);
        if (!am) return;
        const offset = am.sec - vm.vibRelSec;
        offsets.push(offset);
        const pairObj = {
          vibRelSec: vm.vibRelSec,
          audioAbsSec: am.sec,
          audioTimeStr: formatTime(am.sec),
          offset: offset,
        };
        if (am.noteRef) {
          pairObj.note = {
            time: formatTime(am.noteRef.noteSec),
            text: am.noteRef.noteText,
          };
        }
        entry.pairs.push(pairObj);
      });
      // Also collect distinct notes for this xls
      const notesSet = new Set();
      paired.forEach(vm => {
        const am = (e.audioMarks || []).find(m => m.id === vm.pairedAudioId);
        if (am && am.noteRef) notesSet.add(am.noteRef.noteText);
      });
      if (notesSet.size > 0) entry.associatedNotes = Array.from(notesSet);
      if (offsets.length > 0) {
        const meanOff = offsets.reduce((a,b) => a+b, 0) / offsets.length;
        entry.computedStartSec = meanOff;
        entry.computedStartTime = formatTime(meanOff);
        if (offsets.length > 1) {
          entry.maxDeviationMs = Math.round(Math.max(...offsets.map(o => Math.abs(o - meanOff))) * 1000);
        }
      }
      sum.vibFiles[xlsName] = entry;
    });

    // Add event intervals: compute per-event audio and vib time ranges
    if (e.events && e.events.length > 0) {
      const audioObj = (tlData && tlData.audio) ? tlData.audio.find(a => a.name === audioName) : null;
      const audioShift = e.audioShift || 0;
      sum.events = e.events.map(ev => {
        const evOut = {
          id: ev.id,
          type: ev.type,
          label: ev.label,
          absStartTime: formatTime(ev.startSec),
          absEndTime: formatTime(ev.endSec),
          durationSec: +(ev.endSec - ev.startSec).toFixed(3),
        };
        if (ev.noteRef) {
          evOut.note = { time: formatTime(ev.noteRef.noteSec), text: ev.noteRef.noteText };
        }
        // Compute audio-file-relative range (offset from recording start)
        if (audioObj) {
          evOut.audioFile = audioName;
          evOut.audioFileStartSec = +(ev.startSec - audioObj.startSec - audioShift).toFixed(3);
          evOut.audioFileEndSec = +(ev.endSec - audioObj.startSec - audioShift).toFixed(3);
        }
        // Per-xls: if this event overlaps with an xls, compute vib-file-relative range
        evOut.vibFiles = {};
        Object.keys(sum.vibFiles).forEach(xlsName => {
          const vibEntry = sum.vibFiles[xlsName];
          const vibStart = vibEntry.computedStartSec !== undefined
            ? vibEntry.computedStartSec + (e.xlsShifts?.[xlsName] || 0)
            : null;
          const vibObj = tlData.vib.find(v => v.name === xlsName);
          if (!vibObj || vibStart === null) return;
          const vibEnd = vibStart + vibObj.duration;
          if (ev.endSec < vibStart || ev.startSec > vibEnd) return;  // no overlap
          const s = Math.max(0, ev.startSec - vibStart);
          const t = Math.min(vibObj.duration, ev.endSec - vibStart);
          if (t > s) {
            evOut.vibFiles[xlsName] = { vibStartSec: +s.toFixed(3), vibEndSec: +t.toFixed(3) };
          }
        });
        return evOut;
      });
    }

    out.summary[audioName] = sum;
  });

  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url;
  a.download = 'alignment_' + ts + '.json';
  a.click();
  URL.revokeObjectURL(url);
  statusText.textContent = '已导出 alignment_' + ts + '.json';
}

function importAlignment(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.alignData) {
        alert('不是有效的对齐 JSON (缺少 alignData 字段)');
        return;
      }
      // Merge strategy: replace per-audio-file (overwriting current for any audio in imported file)
      const imported = data.alignData;
      const audioNames = Object.keys(imported);
      if (audioNames.length === 0) {
        alert('导入文件为空');
        return;
      }
      if (!confirm('将合并 ' + audioNames.length + ' 个音频的对齐数据。同名音频的原有数据会被覆盖。继续？')) return;
      audioNames.forEach(name => {
        alignData[name] = imported[name];
      });
      saveAlignData();
      // Refresh currently-selected audio's display
      if (currentAudio) selectAudio();
      statusText.textContent = '已导入 ' + audioNames.length + ' 个音频的对齐数据';
    } catch(err) {
      alert('导入失败: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';  // reset so same file can be imported again
}

// ============================================================
// Interval / event annotation
// ============================================================
function toggleIntervalMode() {
  intervalMode = !intervalMode;
  const btn = document.getElementById('intervalModeBtn');
  const sel = document.getElementById('eventTypeSel');
  if (intervalMode) {
    btn.classList.add('playing');
    btn.textContent = '🚄 标区间 [ON]';
    sel.style.display = '';
    statusText.textContent = '区间标注模式: 在数据上拖拽选定一个事件区间';
    wrap.style.cursor = 'text';
  } else {
    btn.classList.remove('playing');
    btn.textContent = '🚄 标区间';
    sel.style.display = 'none';
    statusText.textContent = '退出区间模式';
    wrap.style.cursor = '';
  }
}

function addEvent(startSec, endSec, type) {
  const a = ensureAlignEntry();
  if (startSec > endSec) { const t = startSec; startSec = endSec; endSec = t; }
  if (endSec - startSec < 0.1) return null;  // too short
  const tc = EVENT_TYPES[type] || EVENT_TYPES.other;
  const ev = {
    id: 'e' + Date.now().toString(36) + Math.random().toString(36).substr(2,4),
    type: type,
    label: tc.label,
    startSec: startSec,
    endSec: endSec,
  };
  if (currentNoteRef) {
    ev.noteRef = {
      lineIdx: currentNoteRef.lineIdx,
      noteSec: currentNoteRef.noteSec,
      noteText: currentNoteRef.noteText,
    };
  }
  a.events.push(ev);
  a.events.sort((x, y) => x.startSec - y.startSec);
  saveAlignData();
  draw();
  renderEventList();
  statusText.textContent = '✓ 新事件: ' + tc.icon + tc.label + ' ' + formatTime(startSec) + ' ~ ' + formatTime(endSec) +
    ' (时长 ' + (endSec - startSec).toFixed(2) + 's)';
  return ev;
}

function deleteEvent(id) {
  const a = alignData[currentAudio.name];
  if (!a || !a.events) return;
  a.events = a.events.filter(e => e.id !== id);
  saveAlignData();
  draw();
  renderEventList();
}

function findEventAtPx(px, y) {
  const a = alignData[currentAudio.name];
  if (!a || !a.events) return null;
  const sec = pxToSec(px);
  for (const ev of a.events) {
    if (sec >= ev.startSec && sec <= ev.endSec) return ev;
  }
  return null;
}

function findEventEdgeAtPx(px, y) {
  // Returns {event, edge: 'start'|'end'} if near an edge (within 6px)
  const a = alignData[currentAudio.name];
  if (!a || !a.events) return null;
  const EDGE_TOL = 6;
  for (const ev of a.events) {
    const x0 = secToPx(ev.startSec);
    const x1 = secToPx(ev.endSec);
    if (Math.abs(px - x0) < EDGE_TOL) return { event: ev, edge: 'start' };
    if (Math.abs(px - x1) < EDGE_TOL) return { event: ev, edge: 'end' };
  }
  return null;
}

function drawEvents(plotL, plotR) {
  const a = alignData[currentAudio.name];
  if (!a || !a.events) return;
  const topY = audioRowY();
  const bottomY = axisY();
  const h = bottomY - topY;
  a.events.forEach(ev => {
    const x0 = secToPx(ev.startSec);
    const x1 = secToPx(ev.endSec);
    if (x1 < plotL || x0 > plotR) return;
    const tc = EVENT_TYPES[ev.type] || EVENT_TYPES.other;
    const fillColor = tc.color + ',0.12)';
    const borderColor = tc.color + ',0.6)';
    const labelColor = tc.color + ',0.9)';

    ctx.fillStyle = fillColor;
    const xx = Math.max(x0, plotL);
    const ww = Math.min(x1, plotR) - xx;
    ctx.fillRect(xx, topY, ww, h);
    // Edges
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1.5;
    if (x0 >= plotL && x0 <= plotR) {
      ctx.beginPath(); ctx.moveTo(x0, topY); ctx.lineTo(x0, bottomY); ctx.stroke();
    }
    if (x1 >= plotL && x1 <= plotR) {
      ctx.beginPath(); ctx.moveTo(x1, topY); ctx.lineTo(x1, bottomY); ctx.stroke();
    }
    // Label at top
    if (ww > 30) {
      ctx.fillStyle = labelColor;
      ctx.font = 'bold 10px "Segoe UI", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(tc.icon + ' ' + ev.label + '  ' + (ev.endSec - ev.startSec).toFixed(1) + 's',
                   Math.max(x0 + 4, plotL + 4), topY + 2);
    }
  });
}

function renderEventList() {
  const panel = document.getElementById('eventListPanel');
  if (!panel) return;
  const a = alignData[currentAudio && currentAudio.name];
  if (!a || !a.events || a.events.length === 0) {
    panel.innerHTML = '<div style="color:#6b5a45;font-size:11px;padding:4px">当前音频无事件</div>';
    return;
  }
  let html = '<table style="width:100%;border-collapse:collapse;font-size:11px;font-variant-numeric:tabular-nums">' +
             '<thead><tr>' +
             '<th style="text-align:left;padding:3px 6px;color:#a08a70;font-weight:normal">类型</th>' +
             '<th style="text-align:left;padding:3px 6px;color:#a08a70;font-weight:normal">标签</th>' +
             '<th style="text-align:left;padding:3px 6px;color:#a08a70;font-weight:normal">起始</th>' +
             '<th style="text-align:left;padding:3px 6px;color:#a08a70;font-weight:normal">结束</th>' +
             '<th style="text-align:left;padding:3px 6px;color:#a08a70;font-weight:normal">时长</th>' +
             '<th style="text-align:left;padding:3px 6px;color:#a08a70;font-weight:normal">涉及 xls</th>' +
             '<th></th></tr></thead><tbody>';
  a.events.forEach(ev => {
    const tc = EVENT_TYPES[ev.type] || EVENT_TYPES.other;
    const affected = currentVibs.filter(v => {
      const vs = getVibStartSec(v);
      return vs + v.duration >= ev.startSec && vs <= ev.endSec;
    }).map(v => v.name.replace('.xls',''));
    const affStr = affected.length ? affected.join(',') : '—';
    html += '<tr style="border-bottom:1px solid #2a2118">' +
            '<td style="padding:3px 6px;color:' + tc.color + ',0.9)">' + tc.icon + ' ' + tc.label + '</td>' +
            '<td style="padding:3px 6px"><span class="ev-label" data-id="' + ev.id + '" style="cursor:pointer;border-bottom:1px dotted #6b5a45">' + ev.label + '</span></td>' +
            '<td style="padding:3px 6px;cursor:pointer" class="ev-jump" data-id="' + ev.id + '">' + formatTime(ev.startSec) + '</td>' +
            '<td style="padding:3px 6px">' + formatTime(ev.endSec) + '</td>' +
            '<td style="padding:3px 6px">' + (ev.endSec - ev.startSec).toFixed(1) + 's</td>' +
            '<td style="padding:3px 6px;color:#78c896">' + affStr + '</td>' +
            '<td style="padding:3px 6px;text-align:right"><span class="ev-del" data-id="' + ev.id + '" style="cursor:pointer;color:#e87060">✕</span></td>' +
            '</tr>';
  });
  html += '</tbody></table>';
  panel.innerHTML = html;
  panel.querySelectorAll('.ev-del').forEach(el => el.addEventListener('click', () => {
    if (confirm('删除此事件?')) deleteEvent(el.dataset.id);
  }));
  panel.querySelectorAll('.ev-jump').forEach(el => el.addEventListener('click', () => {
    const ev = a.events.find(e => e.id === el.dataset.id);
    if (!ev) return;
    const pad = (ev.endSec - ev.startSec) * 0.3;
    viewMin = ev.startSec - pad;
    viewMax = ev.endSec + pad;
    draw();
  }));
  panel.querySelectorAll('.ev-label').forEach(el => el.addEventListener('click', () => {
    const ev = a.events.find(e => e.id === el.dataset.id);
    if (!ev) return;
    const newLabel = prompt('编辑标签:', ev.label);
    if (newLabel !== null) {
      ev.label = newLabel.trim() || (EVENT_TYPES[ev.type] || EVENT_TYPES.other).label;
      saveAlignData();
      draw();
      renderEventList();
    }
  }));
}

// Init
window.addEventListener('resize', function() { resize(); draw(); });
init();
</script>
</body>
</html>
